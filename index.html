
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Elite | 1 Mês</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Montserrat', sans-serif; margin: 0; overflow: hidden; }
        #intro { 
            position: fixed; width: 100%; height: 100%; background: #000; 
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .gold-text { 
            font-family: 'Cinzel'; color: #c5a059; letter-spacing: 10px; 
            animation: fade 4s forwards; opacity: 0; 
        }
        @keyframes fade { 50% { opacity: 1; } 100% { opacity: 0; } }

        main { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; opacity: 0; transition: 3s;
        }
        .bouquet { position: relative; width: 300px; height: 350px; margin: 40px; }
        .rose { 
            position: absolute; width: 80px; height: 80px; background: #000;
            border: 2px solid #c5a059; border-radius: 50% 0 50% 50%;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); transform: rotate(-45deg);
        }
        .daisy { 
            position: absolute; width: 70px; height: 70px; 
            background: white; border-radius: 50%; border: 3px solid #c5a059;
        }
        .daisy::after { 
            content: ''; position: absolute; top: 20px; left: 20px; 
            width: 30px; height: 30px; background: #c5a059; border-radius: 50%;
        }
        .p1 { top: 0; left: 110px; } .p2 { top: 70px; left: 30px; } .p3 { top: 70px; left: 190px; }
        h1 { font-family: 'Cinzel'; font-size: 3rem; background: linear-gradient(135deg, #c5a059, #fff3a6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="intro"><h1 class="gold-text">O PRIMEIRO DE MUITOS...</h1></div>
    <main id="content">
        <h1>Sua Rainha</h1>
        <div class="bouquet">
            <div class="rose p1"></div>
            <div class="daisy p2"></div>
            <div class="rose p3"></div>
        </div>
        <p>1 MÊS DE PURO LUXO AO SEU LADO. <br> <span style="color:#c5a059">Seu Nome</span></p>
    </main>
    <script>
        setTimeout(() => { 
            document.getElementById('intro').style.display = 'none'; 
            document.getElementById('content').style.opacity = '1';
        }, 4500);
    </script>
</body>
</html>
