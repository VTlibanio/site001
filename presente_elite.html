
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Elite | 1 Mês</title>
    <style>
        @import url('https://fonts.googleapis.com');

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; overflow: hidden; 
            font-family: 'Montserrat', sans-serif;
        }

        /* TELA DE INTRODUÇÃO (A APRESENTAÇÃO) */
        #intro {
            position: fixed; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 999; transition: opacity 1.5s ease-in-out;
        }

        .gold-line {
            width: 0%; height: 1px; background: #c5a059;
            margin-bottom: 20px; animation: expand 3s forwards;
        }

        .intro-msg {
            font-family: 'Cinzel'; color: #c5a059; letter-spacing: 5px;
            opacity: 0; animation: fadeIn 2s 0.5s forwards; text-align: center;
        }

        /* CONTEÚDO PRINCIPAL (O SITE) */
        main {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle, #151515 0%, #000 100%);
            opacity: 0; transition: opacity 2.5s ease;
        }

        .bouquet { position: relative; width: 300px; height: 350px; filter: drop-shadow(0 0 25px rgba(197,160,89,0.3)); }

        /* ROSAS ELITE */
        .rose { 
            position: absolute; width: 80px; height: 80px; background: #000;
            border: 2px solid #c5a059; border-radius: 50% 0 50% 50%;
            transform: rotate(-45deg); animation: pulse 3s infinite;
        }

        /* MARGARIDAS ELITE */
        .daisy { 
            position: absolute; width: 70px; height: 70px; 
            background: #fff; border-radius: 50%; border: 3px solid #c5a059;
        }
        .daisy::after { 
            content: ''; position: absolute; top: 50%; left: 50%; 
            width: 25px; height: 25px; background: #c5a059; 
            border-radius: 50%; transform: translate(-50%, -50%);
        }

        .p1 { top: 0; left: 110px; } 
        .p2 { top: 80px; left: 40px; } 
        .p3 { top: 80px; left: 180px; }

        h1 { 
            font-family: 'Cinzel'; font-size: 3.5rem; margin: 0;
            background: linear-gradient(to right, #c5a059, #fff3a6, #c5a059);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        @keyframes expand { from { width: 0%; } to { width: 200px; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 
            0%, 100% { transform: rotate(-45deg) scale(1); filter: brightness(1); }
            50% { transform: rotate(-45deg) scale(1.1); filter: brightness(1.4); }
        }
    </style>
</head>
<body>

    <div id="intro">
        <div class="gold-line"></div>
        <div class="intro-msg">
            PRIMEIRO MÊS<br>DE UMA HISTÓRIA DE MILHÕES
        </div>
    </div>

    <main id="main">
        <h1>NOME DELA AQUI</h1>
        <div class="bouquet">
            <div class="rose p1"></div>
            <div class="daisy p2"></div>
            <div class="rose p3"></div>
        </div>
        <p style="letter-spacing: 4px; color: #888;">SEU NOME AQUI & NOME DELA AQUI</p>
    </main>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro').style.opacity = '0';
                document.getElementById('main').style.opacity = '1';
                setTimeout(() => {
                    document.getElementById('intro').style.display = 'none';
                }, 1500);
            }, 4000);
        };
    </script>
</body>
</html>
